name: CI — Test & Validate Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Lint check (syntax only)
        run: |
          python -m py_compile src/data/generate_dataset.py
          python -m py_compile src/features/build_features.py
          python -m py_compile src/models/train.py
          python -m py_compile src/explainability/shap_explain.py
