name: Scheduled Retrain & Export

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of each month, 06:00 UTC
  workflow_dispatch: {}

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate features
        run: python src/features/build_features.py

      - name: Retrain model
        run: python src/models/train.py

      - name: Recompute SHAP explanations
        run: python src/explainability/shap_explain.py

      - name: Export Power BI feeds
        run: python powerbi/export_for_powerbi.py

      - name: Commit updated artifacts
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed reports src/models powerbi/exports
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: scheduled retrain $(date -u +%Y-%m-%d)"
          git push
